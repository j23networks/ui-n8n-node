name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # --ignore-scripts skips native postinstall builds. n8n-workflow pulls in
      # isolated-vm (its runtime expression sandbox), which needs Node >=22 and a
      # C++ toolchain — irrelevant here, since we only compile against
      # n8n-workflow's type declarations. Skipping it avoids the native build.
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
