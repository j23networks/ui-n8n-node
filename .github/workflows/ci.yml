name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Uses `npm install` so CI works before a package-lock.json is committed.
      # Once you commit a lockfile, switch this to `npm ci` and add
      # `cache: npm` to the setup-node step above for faster, reproducible runs.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
